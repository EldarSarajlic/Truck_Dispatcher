@if (totalItems > 0) {
  <div class="paginator-bar">
    <div class="paginator-info">
      Showing <strong>{{ getShowingStart() }}–{{ getShowingEnd() }}</strong> of <strong>{{ totalItems }}</strong> users
    </div>
    <div class="paginator-controls">
      <button class="pg-btn pg-nav" (click)="pageChange.emit(currentPage - 1)" [disabled]="currentPage === 1">
        <i class="ph-duotone ph-caret-left"></i>
        Prev
      </button>

      <div class="pg-sep"></div>

      @for (page of getPageNumbers(); track $index) {
        @if (page === null) {
          <span class="pg-ellipsis">···</span>
        } @else {
          <button
            class="pg-btn"
            [class.pg-active]="page === currentPage"
            (click)="page !== currentPage && pageChange.emit(page)"
          >{{ page }}</button>
        }
      }

      <div class="pg-sep"></div>

      <button class="pg-btn pg-nav" (click)="pageChange.emit(currentPage + 1)" [disabled]="currentPage === totalPages">
        Next
        <i class="ph-duotone ph-caret-right"></i>
      </button>
    </div>
  </div>
}

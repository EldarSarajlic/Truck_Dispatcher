<div class="min-h-screen bg-linear-to-br from-slate-900 via-blue-900 to-slate-900 flex items-center justify-center px-4">
  <div class="text-center space-y-6 max-w-lg">

    <div class="text-blue-400 flex justify-center">
      <i class="ph-duotone ph-map-trifold" style="font-size: 6rem;"></i>
    </div>

    <div>
      <h1 class="text-8xl font-bold text-white tracking-tight">404</h1>
      <p class="text-2xl font-semibold text-blue-300 mt-2">Route Not Found</p>
      <p class="text-slate-400 mt-3">
        Looks like this shipment got lost. The page you're looking for doesn't exist or has been moved.
      </p>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 justify-center pt-2">
      <button class="btn btn-primary" (click)="goBack()">
        <i class="ph-duotone ph-house"></i>
        Go Home
      </button>
      <button class="btn btn-outline btn-info" onclick="history.back()">
        <i class="ph-duotone ph-arrow-left"></i>
        Go Back
      </button>
    </div>

  </div>
</div>

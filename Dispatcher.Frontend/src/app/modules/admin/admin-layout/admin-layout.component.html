<div class="drawer lg:drawer-open min-h-screen h-screen bg-base-200">

  <input id="admin-drawer" type="checkbox" class="drawer-toggle" />

  <!-- MAIN CONTENT -->
  <div class="drawer-content flex flex-col min-h-screen">

    <!-- TOP BAR (mobile) -->
    <div class="navbar bg-base-100 lg:hidden shadow">
      <label for="admin-drawer" class="btn btn-ghost btn-square text-xl">☰</label>
    </div>

    <!-- PAGE CONTENT -->
    <main class="flex-1 p-8">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- SIDEBAR -->
  <div class="drawer-side h-full">
    <label for="admin-drawer" class="drawer-overlay"></label>
    <app-sidebar
      [navItems]="adminNavItems"
      [languages]="languages"
      [currentLang]="currentLang"
      (languageChange)="switchLanguage($event)">
    </app-sidebar>
  </div>

</div>
